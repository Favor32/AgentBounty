name: AgentBounty CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: run_tests
        run: npm test

      # Notify AgentBounty backend of CI result
      # This triggers escrow release or refund
      - name: Notify AgentBounty (success)
        if: success()
        run: |
          curl -X POST "${{ secrets.AGENTBOUNTY_API_URL }}/webhook/simulate" \
            -H "Content-Type: application/json" \
            -d '{
              "bountyId": "${{ secrets.BOUNTY_ID }}",
              "result": "success"
            }' \
            --fail --silent --show-error || echo "AgentBounty notify failed (non-blocking)"

      - name: Notify AgentBounty (failure)
        if: failure()
        run: |
          curl -X POST "${{ secrets.AGENTBOUNTY_API_URL }}/webhook/simulate" \
            -H "Content-Type: application/json" \
            -d '{
              "bountyId": "${{ secrets.BOUNTY_ID }}",
              "result": "failure"
            }' \
            --fail --silent --show-error || echo "AgentBounty notify failed (non-blocking)"